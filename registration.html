<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>repa | Regisztráció</title>
    <link rel="icon" href="rootimg/favicon.png" class="ikon">

    <!-- CSS -->
    <link rel="stylesheet" href="rootcss/root.css">
    <link rel="stylesheet" href="registration/css/registration.css">
    

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <form method="POST">
        <div id="head">
            <img src="registration/img/image.png" alt="repa" width="90" class="ikon" style="float: right">
            <h1 id="cim">repa</h1>
        </div>
        <div id="mid-section">
            <label for="input-email" id="e-mail">E-Mail</label>
            <input id="input-email" type="email" class="brackets">
        
            <label for="input-name" class="name-password">Felhasználónév</label>
            <input id="input-name" type="text" class="brackets">
        
            <label for="input-password" class="name-password">Jelszó</label>
            <input id="input-password" type="password" class="brackets">
        
            <label for="last-bracket" class="name-password">Jelszó megerősítés</label>
            <input id="last-bracket" type="password">
        </div>
        <div id="regplace">
            <input type="button" value="Regisztráció" id="registration">
        </div>
        <div id="log">
            <a href="login.html" id="log-style"><p>Már van fiókja?</p></a>
        </div>
    </form>
</body>
</html>
